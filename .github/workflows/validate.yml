name: Validate Org Governance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure required governance files exist
        run: |
          test -f CODEOWNERS
          test -f CODE_OF_CONDUCT.md
          test -f GOVERNANCE.md
          test -f SECURITY.md
          test -f SUPPORT.md
          test -f profile/README.md
          test -f .github/pull_request_template.md
          test -f .github/ISSUE_TEMPLATE/config.yml
          test -f .github/ISSUE_TEMPLATE/bug_report.yml
          test -f .github/ISSUE_TEMPLATE/integration_request.yml
